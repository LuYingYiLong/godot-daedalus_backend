name: Build & Release Backend Binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.2.0"
        required: true
        type: string
      draft:
        description: "Create a draft release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark the release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: backend-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-windows-x64:
    name: Build Windows x64 SEA
    runs-on: windows-latest
    env:
      DAEDALUS_AUTHENTICODE_SIGNED: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Verify release version
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag_name }}" } else { "${{ github.ref_name }}" }
          $expectedVersion = $tag -replace '^v', ''
          $packageVersion = (Get-Content -LiteralPath package.json -Raw | ConvertFrom-Json).version
          if ($packageVersion -ne $expectedVersion) {
            throw "Tag $tag does not match package version $packageVersion."
          }

      - name: Test source runtime
        run: npm test

      - name: Build keytar for pinned Node
        run: npm run build:native:win

      - name: Build and smoke test SEA
        run: npm run build:sea:win

      - name: Verify release files
        shell: pwsh
        run: |
          $releaseDir = "dist/sea-win32-x64/release"
          $required = @(
            "daedalus-backend-win32-x64.zip",
            "daedalus-backend-win32-x64.json",
            "daedalus-backend-win32-x64.cdx.json",
            "SHA256SUMS.txt"
          )
          foreach ($name in $required) {
            $path = Join-Path $releaseDir $name
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Missing backend release asset: $name"
            }
          }
          $manifest = Get-Content -LiteralPath (Join-Path $releaseDir "daedalus-backend-win32-x64.json") -Raw | ConvertFrom-Json
          if ($manifest.platform -ne "win32" -or $manifest.arch -ne "x64") {
            throw "Unexpected backend manifest target."
          }
          if ($manifest.authenticode -ne "unsigned") {
            throw "Unsigned release workflow produced an unexpected Authenticode status."
          }
          Get-ChildItem -LiteralPath $releaseDir -File | Format-Table Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: daedalus-backend-win32-x64
          path: dist/sea-win32-x64/release/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: Daedalus Backend ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          overwrite_files: true
          files: dist/sea-win32-x64/release/*
